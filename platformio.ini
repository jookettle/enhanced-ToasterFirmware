; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32

; Please refer here to select the partitions that can be configured.
; https://github.com/espressif/arduino-esp32/tree/master/tools/partitions
board_build.partitions = noota_3gffat.csv
board_build.filesystem = fatfs
board_build.flash_mode = qio
board_build.f_flash = 80000000L

board_build.f_cpu = 240000000L
framework = arduino
upload_speed = 921600
monitor_speed = 115200
monitor_raw = true
monitor_rts = 0
build_flags =
  -DUSE_ARDUINO
  -DMQTT_ENABLE=false
  -D_IR_ENABLE_DEFAULT_=false
  -DEXAMPLES_ENABLE=false
  -DMDNS_ENABLE=false
  -DUSE_DECODED_AC_SETTINGS=false
  -DDECODE_NEC=true
lib_deps = 
  Wire
  https://github.com/adafruit/Adafruit_BusIO.git#1.17.4
  https://github.com/adafruit/Adafruit-GFX-Library.git#1.12.6
  https://github.com/deltafish32/ESP32-HUB75-MatrixPanel-DMA.git#5a09fc7320daaf63b749ed4c7b4969f2cee4e1d4
  https://github.com/adafruit/Adafruit_SSD1306.git#2.5.16
  https://github.com/deltafish32/IRremoteESP8266.git#4c14a5390ee0bc847b48335ecc7617e1616dfc14
  Makuna/NeoPixelBus#2.8.4
  rneurink/VL53L1X_ULD#V1.2.3
  claws/BH1750#1.3.0
  https://github.com/adafruit/Adafruit_SHT31.git#2.2.2
  https://github.com/deltafish32/JPEGDEC.git#b9b4a2dd68f55f82c5e291aa379890263fea58e8
  https://github.com/deltafish32/AnimatedGIF.git#c2ca974b91aac75c0e1c03e3c35108750899d644
  https://github.com/jarzebski/Arduino-DS3231.git#1.1.0


[env:esp32dev]
board = esp32dev


[env:adafruit_matrixportal_esp32s3]
board = adafruit_matrixportal_esp32s3

; Please refer here to select the partitions that can be configured.
; https://github.com/espressif/arduino-esp32/tree/master/tools/partitions
board_build.partitions = tf_8mb.csv
board_build.arduino.memory_type = qio_qspi
board_build.psram = enabled
board_build.psram_type = qspi
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
build_flags = 
  ${env.build_flags}
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_SERIAL_JTAG=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_JTAG_ON_BOOT=1
  -DUSE_LOCAL_ESPNOW
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
  -DUSE_SD
  -DPIN_FSPI_CLK=13
  -DPIN_FSPI_MISO=12
  -DPIN_FSPI_MOSI=11
  -DPIN_FSPI_CS=10

