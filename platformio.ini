; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32

; Please refer here to select the partitions that can be configured.
; https://github.com/espressif/arduino-esp32/tree/master/tools/partitions
board_build.partitions = noota_3gffat.csv
board_build.filesystem = fatfs
board_build.flash_mode = qio
board_build.f_flash = 80000000L

board_build.f_cpu = 240000000L
framework = arduino
upload_speed = 921600
monitor_speed = 115200
monitor_raw = true
monitor_rts = 0
build_flags =
  -DUSE_ARDUINO
  -DMQTT_ENABLE=false
  -D_IR_ENABLE_DEFAULT_=false
  -DEXAMPLES_ENABLE=false
  -DMDNS_ENABLE=false
  -DUSE_DECODED_AC_SETTINGS=false
  -DDECODE_NEC=true
lib_deps = 
  Wire
  adafruit/Adafruit BusIO
  adafruit/Adafruit GFX Library
  https://github.com/deltafish32/ESP32-HUB75-MatrixPanel-DMA.git
  adafruit/Adafruit SSD1306
  https://github.com/deltafish32/IRremoteESP8266.git
  Makuna/NeoPixelBus
  rneurink/VL53L1X_ULD
  claws/BH1750
  https://github.com/adafruit/Adafruit_SHT31.git
  https://github.com/deltafish32/JPEGDEC.git
  https://github.com/deltafish32/AnimatedGIF.git
  https://github.com/jarzebski/Arduino-DS3231.git


[env:esp32dev]
board = esp32dev


[env:adafruit_matrixportal_esp32s3]
board = adafruit_matrixportal_esp32s3

; Please refer here to select the partitions that can be configured.
; https://github.com/espressif/arduino-esp32/tree/master/tools/partitions
board_build.partitions = tf_8mb.csv
board_build.arduino.memory_type = qio_qspi
board_build.psram = enabled
board_build.psram_type = qspi
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
build_flags = 
  ${env.build_flags}
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_SERIAL_JTAG=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_JTAG_ON_BOOT=1
  -DUSE_LOCAL_ESPNOW
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
  -DUSE_SD
  -DPIN_FSPI_CLK=13
  -DPIN_FSPI_MISO=12
  -DPIN_FSPI_MOSI=11
  -DPIN_FSPI_CS=10

[env:native]
platform = native
framework = 
build_flags = 
  -DNATIVE_SIMULATOR
  -std=c++17
  -mwindows
  -DWIN32_LEAN_AND_MEAN
  -DNOMINMAX
  -luser32
  -lgdi32
  -I simulator-native/mocks
  -I include
  -I src
  -DARDUINO=100
  -DUSB_SERIAL
  -DPRO_CPU_NUM=0
  -DAPP_CPU_NUM=1
lib_compat_mode = off
lib_ignore = 
  Adafruit BusIO
  Adafruit GFX Library
  Adafruit SSD1306
  ESP32 HUB75 LED MATRIX PANEL DMA Display
  ESP32-HUB75-MatrixPanel-DMA
  IRremoteESP8266
  NeoPixelBus
  VL53L1X_ULD
  BH1750
  Adafruit SHT31 Library
  AnimatedGIF
  JPEGDEC
  Arduino-DS3231
build_src_filter = 
  +<*>
  -<main.cpp>
  -<hal/display/hub75_display.cpp>
  -<hal/display/neopixel_display.cpp>
  -<hal/sensor/*>
  -<hal/controller/*>
  +<../simulator-native/src/main_native.cpp>
  +<../simulator-native/src/native_gui.cpp>
  +<../simulator-native/src/sim_display.cpp>
  +<../simulator-native/src/sim_hal_display.cpp>
  +<../simulator-native/src/mocks.cpp>


