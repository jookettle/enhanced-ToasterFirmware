name: CI

on:
  push:
    branches: [main, master, chore/pin-lib-deps]
  pull_request:
    branches: [main, master, chore/pin-lib-deps]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run clang-format
        uses: DoozyX/clang-format-lint-action@v0.16
        with:
          source: '.'
          extensions: 'cpp,h,hpp,c'
          clangFormatVersion: 16
          style: file
          exclude: './.git ./.pio'

  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [esp32dev, adafruit_matrixportal_esp32s3]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache PlatformIO & pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.platformio/.cache
            .pio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Show PlatformIO version
        run: pio --version

      - name: Build Environment
        run: pio run -e ${{ matrix.env }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: firmware-${{ matrix.env }}
          path: .pio/build/${{ matrix.env }}/
